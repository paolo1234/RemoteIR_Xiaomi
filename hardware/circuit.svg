<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <title>IRXiaomi - Circuito Learning via Jack Audio</title>
  <style>
    text { font-family: Arial, sans-serif; }
    .label { font-size: 13px; fill: #333; }
    .title { font-size: 18px; font-weight: bold; fill: #1A73E8; }
    .subtitle { font-size: 12px; fill: #666; }
    .pin-label { font-size: 10px; fill: #fff; text-anchor: middle; dominant-baseline: central; }
    .wire { stroke: #333; stroke-width: 2; fill: none; }
    .wire-red { stroke: #E53935; stroke-width: 2; fill: none; }
    .wire-black { stroke: #333; stroke-width: 2; fill: none; }
    .wire-green { stroke: #43A047; stroke-width: 2; fill: none; }
    .component { fill: #f0f0f0; stroke: #999; stroke-width: 1.5; }
    .component-body { fill: #e3f2fd; stroke: #1A73E8; stroke-width: 1.5; rx: 4; }
  </style>

  <!-- Titolo -->
  <text x="400" y="30" text-anchor="middle" class="title">Circuito Learning IR via Jack Audio</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Fototransistor IR + Jack TRRS 3.5mm → Microfono Android</text>

  <!-- ==================== JACK AUDIO ==================== -->
  <g transform="translate(500, 100)">
    <rect x="0" y="0" width="140" height="200" class="component-body"/>
    <text x="70" y="20" text-anchor="middle" class="label" font-weight="bold">Jack TRRS 3.5mm</text>

    <!-- Corpo jack -->
    <rect x="20" y="30" width="100" height="150" rx="5" fill="#ddd" stroke="#999"/>
    <rect x="35" y="40" width="70" height="130" rx="3" fill="#ccc"/>

    <!-- Anelli contatto -->
    <rect x="35" y="45" width="70" height="8" fill="#333"/>
    <text x="105" y="52" class="pin-label" fill="#fff" font-size="9">TIP</text>
    <rect x="35" y="70" width="70" height="8" fill="#333"/>
    <text x="105" y="77" class="pin-label" fill="#fff" font-size="9">RING1</text>
    <rect x="35" y="95" width="70" height="8" fill="#333"/>
    <text x="105" y="102" class="pin-label" fill="#fff" font-size="9">RING2</text>
    <rect x="35" y="120" width="70" height="8" fill="#333"/>
    <text x="105" y="127" class="pin-label" fill="#fff" font-size="9">SLEEVE</text>

    <!-- Label canali -->
    <text x="15" y="52" text-anchor="end" class="label" fill="#E53935">L</text>
    <text x="15" y="77" text-anchor="end" class="label" fill="#43A047">R</text>
    <text x="15" y="102" text-anchor="end" class="label" fill="#666">GND</text>
    <text x="15" y="127" text-anchor="end" class="label" fill="#FB8C00">MIC</text>

    <!-- Pin in basso -->
    <line x1="45" y1="170" x2="45" y2="200" class="wire-red"/>
    <line x1="70" y1="170" x2="70" y2="200" class="wire-black"/>
    <line x1="95" y1="170" x2="95" y2="200" class="wire-green"/>

    <text x="45" y="215" text-anchor="middle" class="label" font-size="10">L (Tip)</text>
    <text x="70" y="215" text-anchor="middle" class="label" font-size="10">GND</text>
    <text x="95" y="215" text-anchor="middle" class="label" font-size="10">MIC</text>
  </g>

  <!-- ==================== FILI ==================== -->
  <!-- Filo da MIC a R1 -->
  <path d="M 405,280 C 405,320 450,320 450,300" class="wire-green"/>
  <path d="M 450,300 L 475,300" class="wire-green"/>

  <!-- Filo GND a R1 -->
  <path d="M 425,310 L 425,380 L 500,380 L 500,310" class="wire-black"/>

  <!-- Filo da VCC a R2 -->
  <path d="M 340,280 L 340,320 L 370,320" class="wire-red"/>

  <!-- ==================== FOTOTRANSISTOR IR ==================== -->
  <g transform="translate(300, 180)">
    <rect x="0" y="0" width="120" height="180" class="component-body"/>
    <text x="60" y="20" text-anchor="middle" class="label" font-weight="bold">TSOP38238</text>

    <!-- Corpo -->
    <rect x="15" y="30" width="90" height="120" rx="5" fill="#333"/>
    <circle cx="60" cy="55" r="15" fill="#1A237E" opacity="0.8"/>
    <text x="60" y="58" text-anchor="middle" class="pin-label" font-size="11" fill="#FFD600">IR</text>

    <!-- Pin -->
    <rect x="10" y="130" width="20" height="20" rx="2" fill="#E53935"/>
    <text x="20" y="143" class="pin-label" font-size="8">OUT</text>
    <rect x="50" y="130" width="20" height="20" rx="2" fill="#333"/>
    <text x="60" y="143" class="pin-label" font-size="8">GND</text>
    <rect x="90" y="130" width="20" height="20" rx="2" fill="#E53935"/>
    <text x="100" y="143" class="pin-label" font-size="8">VCC</text>

    <!-- Pin in basso -->
    <line x1="20" y1="150" x2="20" y2="200" class="wire-green"/>
    <line x1="60" y1="150" x2="60" y2="200" class="wire-black"/>
    <line x1="100" y1="150" x2="100" y2="200" class="wire-red"/>

    <text x="20" y="215" text-anchor="middle" class="label" font-size="10">OUT</text>
    <text x="60" y="215" text-anchor="middle" class="label" font-size="10">GND</text>
    <text x="100" y="215" text-anchor="middle" class="label" font-size="10">VCC (3-5V)</text>
  </g>

  <!-- ==================== RESISTORI ==================== -->
  <!-- R1: 10kΩ tra MIC e OUT -->
  <g transform="translate(380, 260)">
    <rect x="0" y="0" width="80" height="40" class="component-body"/>
    <rect x="10" y="5" width="60" height="30" rx="3" fill="#FFECB3" stroke="#F9A825" stroke-width="1.5"/>
    <text x="40" y="18" text-anchor="middle" class="label" font-size="9" font-weight="bold">R1</text>
    <text x="40" y="30" text-anchor="middle" class="label" font-size="8">10kΩ</text>
    <!-- Codice colori: marrone, nero, arancione -->
    <rect x="10" y="8" width="4" height="24" fill="#795548"/>
    <rect x="16" y="8" width="4" height="24" fill="#333"/>
    <rect x="22" y="8" width="4" height="24" fill="#FF6F00"/>
    <line x1="0" y1="20" x2="-20" y2="20" class="wire"/>
    <line x1="80" y1="20" x2="100" y2="20" class="wire"/>
  </g>

  <!-- R2: 100Ω tra VCC e alimentazione -->
  <g transform="translate(280, 290)">
    <rect x="0" y="0" width="70" height="35" class="component-body"/>
    <rect x="5" y="3" width="60" height="29" rx="3" fill="#FFECB3" stroke="#F9A825" stroke-width="1.5"/>
    <text x="35" y="15" text-anchor="middle" class="label" font-size="9" font-weight="bold">R2</text>
    <text x="35" y="27" text-anchor="middle" class="label" font-size="8">100Ω</text>
    <rect x="5" y="6" width="4" height="23" fill="#795548"/>
    <rect x="11" y="6" width="4" height="23" fill="#333"/>
    <rect x="17" y="6" width="4" height="23" fill="#795548"/>
    <line x1="0" y1="17" x2="-20" y2="17" class="wire"/>
    <line x1="70" y1="17" x2="90" y2="17" class="wire"/>
  </g>

  <!-- ==================== JACK TELEFONO ==================== -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="180" height="200" class="component-body"/>
    <text x="90" y="20" text-anchor="middle" class="label" font-weight="bold">Smartphone Android</text>

    <!-- Icona telefono -->
    <rect x="40" y="30" width="100" height="160" rx="15" fill="#333"/>
    <rect x="45" y="35" width="90" height="150" rx="12" fill="#263238"/>
    <circle cx="90" cy="175" r="5" fill="#555"/>

    <!-- Schermo -->
    <rect x="52" y="42" width="76" height="120" rx="3" fill="#1A73E8" opacity="0.8"/>
    <text x="90" y="80" text-anchor="middle" class="pin-label" font-size="11">IRXiaomi</text>
    <text x="90" y="100" text-anchor="middle" class="pin-label" font-size="9">App Learning</text>

    <!-- Jack in alto -->
    <rect x="75" y="20" width="30" height="15" rx="3" fill="#555"/>
    <text x="90" y="31" text-anchor="middle" class="pin-label" font-size="8">🎧</text>
  </g>

  <!-- ==================== LEGENDA ==================== -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="700" height="200" rx="8" fill="#fafafa" stroke="#ddd"/>
    <text x="20" y="25" class="label" font-weight="bold">Lista componenti (BOM)</text>

    <text x="20" y="50" class="label">1x TSOP38238 (o TSOP4838, VS1838B, TL1838) − Ricevitore IR 38kHz</text>
    <text x="20" y="70" class="label">1x R1: Resistenza 10kΩ (marrone-nero-arancione) − Pull-up per OUT</text>
    <text x="20" y="90" class="label">1x R2: Resistenza 100Ω (marrone-nero-marrone) − Protezione TSOP</text>
    <text x="20" y="110" class="label">1x Jack TRRS 3.5mm (stereo + microfono) − Per connessione smartphone</text>
    <text x="20" y="130" class="label">Cavi di collegamento + breadboard (opzionale per prototipo)</text>

    <text x="20" y="160" class="label" font-weight="bold" fill="#1A73E8">Costo totale: &lt; 2€</text>
    <text x="20" y="180" class="subtitle">Schema collegamento: TSOP OUT → R1 → MIC (Ring2) | TSOP GND → GND (Sleeve) | TSOP VCC → 3.3V</text>
  </g>

  <!-- Frecce collegamenti -->
  <path d="M 320,380 L 320,420 L 300,420" class="wire-green" stroke-dasharray="5,3"/>
  <path d="M 360,380 L 360,420" class="wire-black" stroke-dasharray="5,3"/>
  <path d="M 400,380 L 400,420 L 420,420" class="wire-red" stroke-dasharray="5,3"/>

</svg>
